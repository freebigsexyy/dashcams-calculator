<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashcams — Send Link</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--red:#B91C1C;--red-d:#991B1B;--text:#111;--muted:#555;--light:#999;--bg:#F5F4F2;--white:#fff;--border:#E2E0DC;}
html,body{min-height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
.bar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.logo{display:flex;align-items:center;gap:7px;}
.logo-txt{font-size:15px;font-weight:700;letter-spacing:0.03em;}
.logo-txt span{color:var(--red);}
.bar-sub{font-size:10px;color:var(--light);letter-spacing:0.06em;text-transform:uppercase;}
.content{padding:20px 18px 40px;max-width:480px;margin:0 auto;}
.page-title{font-size:22px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.scene-lbl{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.scene-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.scene-btn{padding:11px 6px;border:1px solid var(--border);border-radius:9px;background:var(--white);font-size:12px;font-weight:500;color:var(--muted);text-align:center;cursor:pointer;line-height:1.3;transition:all 0.15s;}
.scene-btn.active{background:var(--red);border-color:var(--red);color:white;font-weight:700;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.field input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;color:var(--text);background:var(--white);outline:none;-webkit-appearance:none;transition:border-color 0.15s;}
.field input:focus{border-color:var(--red);}
.field input::placeholder{color:#BBBBBB;}
.field-hint{font-size:11px;color:var(--light);margin-top:4px;line-height:1.4;}
.gen-btn{display:block;width:100%;padding:16px;background:var(--red);color:white;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:8px;transition:background 0.15s;}
.gen-btn:active{background:var(--red-d);}
.save-note{text-align:center;font-size:12px;color:var(--light);}
.result{display:none;background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:20px;}
.result.show{display:block;}
.res-hdr{background:var(--red);padding:12px 16px;}
.res-hdr-txt{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:white;}
.sms-preview{padding:14px 16px;border-bottom:1px solid var(--border);}
.sms-lbl{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--light);margin-bottom:8px;}
.sms-bubble{background:#E9E9EB;border-radius:18px 18px 18px 4px;padding:11px 14px;font-size:14px;color:var(--text);line-height:1.55;word-break:break-word;}
.char-ct{text-align:right;font-size:11px;margin-top:5px;}
.char-ct.ok{color:var(--light);}
.char-ct.warn{color:#B45309;}
.char-ct.over{color:var(--red);}
.act-btns{display:grid;grid-template-columns:1fr 1fr;}
.act-btn{padding:14px;border:none;background:transparent;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background 0.12s;}
.act-btn:active{background:var(--bg);}
.act-btn.copy{color:var(--red);border-right:1px solid var(--border);}
.act-btn.sms{color:var(--text);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:white;font-size:13px;font-weight:500;padding:10px 20px;border-radius:20px;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="bar">
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="10" stroke="#B91C1C" stroke-width="1.6"/><circle cx="11" cy="11" r="6" fill="#B91C1C"/><circle cx="11" cy="11" r="2.5" fill="#111"/><circle cx="12.4" cy="9.6" r="1.1" fill="white" opacity="0.9"/></svg>
    <div class="logo-txt">DASHCAMS<span>.</span>COM</div>
  </div>
  <div class="bar-sub">Send Link</div>
</div>

<div class="content">
  <div class="page-title">Text a GM</div>
  <div class="page-sub">Fill in the fields and tap Generate. Opens Messages with your text pre-filled.</div>

  <div class="scene-lbl">Scenario</div>
  <div class="scene-btns">
    <div class="scene-btn active" id="s-cold" onclick="setScene('cold')">Cold<br>outreach</div>
    <div class="scene-btn" id="s-warm" onclick="setScene('warm')">After<br>email</div>
    <div class="scene-btn" id="s-post" onclick="setScene('post')">Post<br>meeting</div>
  </div>

  <div class="field">
    <label>GM First Name</label>
    <input type="text" id="f_gm" placeholder="e.g. Michael" oninput="upd()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="field">
    <label>Dealership Name</label>
    <input type="text" id="f_dealer" placeholder="e.g. Sands Kia Phoenix" oninput="upd()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="field">
    <label>Monthly Car Sales</label>
    <input type="text" inputmode="numeric" id="f_sales" placeholder="100" value="100" oninput="upd()">
  </div>
  <div class="field">
    <label>Your Phone Number</label>
    <input type="tel" id="f_phone" placeholder="e.g. 6025550100" oninput="upd()" autocomplete="tel">
    <div class="field-hint">Used for the tap-to-call button on the GM's page.</div>
  </div>
  <div class="field">
    <label>Your Name</label>
    <input type="text" id="f_name" placeholder="e.g. Erik Ness" oninput="upd()" autocomplete="name">
  </div>

  <button class="gen-btn" onclick="generate()">Generate &amp; Copy Link</button>
  <div class="save-note">Fields save automatically to this browser.</div>

  <div class="result" id="result">
    <div class="res-hdr"><div class="res-hdr-txt">Ready to send &#10003;</div></div>
    <div class="sms-preview">
      <div class="sms-lbl">Your text message</div>
      <div class="sms-bubble" id="sms-txt"></div>
      <div class="char-ct ok" id="char-ct"></div>
    </div>
    <div class="act-btns">
      <button class="act-btn copy" onclick="copyTxt()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy Text
      </button>
      <button class="act-btn sms" onclick="openSms()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Open Messages
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var BASE='https://freebigsexyy.github.io/dashcams-calculator/gm.html';
var scene='cold', link='', sms='';
var IDS=['f_gm','f_dealer','f_sales','f_phone','f_name'];

function save(){var d={};IDS.forEach(function(id){var el=document.getElementById(id);if(el)d[id]=el.value;});d.s=scene;try{localStorage.setItem('dc_send_v2',JSON.stringify(d));}catch(e){}}
function load(){try{var r=localStorage.getItem('dc_send_v2');if(!r)return;var d=JSON.parse(r);IDS.forEach(function(id){var el=document.getElementById(id);if(el&&d[id])el.value=d[id];});if(d.s)setScene(d.s,true);}catch(e){}}
function gv(id){return((document.getElementById(id)||{}).value||'').trim();}
function setScene(s,silent){scene=s;['cold','warm','post'].forEach(function(x){document.getElementById('s-'+x).classList.toggle('active',x===s);});if(!silent){save();upd();}}

function buildLink(){
  var p=new URLSearchParams();
  var dealer=gv('f_dealer'),gm=gv('f_gm'),name=gv('f_name'),phone=gv('f_phone'),sales=gv('f_sales')||'100';
  if(dealer)p.set('dealer',dealer);
  if(gm)p.set('gm',gm);
  if(name)p.set('nsd',name);
  if(phone)p.set('phone',phone);
  p.set('sales',sales);p.set('retail','649');p.set('pct','65');p.set('comm','50');p.set('parts','35');p.set('svc','65');p.set('launch','1500');
  return BASE+'?'+p.toString();
}

function buildSms(url){
  var gm=gv('f_gm'),dealer=gv('f_dealer')||'your store',name=gv('f_name'),first=name?name.split(' ')[0]:'I';
  // Cold: short intro to Dashcams.com + personalized profit model link
  if(scene==='cold') return first+' at Dashcams.com, patented plug and play 4K dashcams installed at dealerships. Built a 60-sec profit model for you: '+url;
  if(scene==='warm'){var g=gm?'Hi '+gm+', ':'';return g+'sent you a Dashcams.com email. Here is the profit model for '+dealer+': '+url;}
  var g2=gm?'Hi '+gm+', ':'';return g2+'great meeting today. Here are the numbers for '+dealer+': '+url;
}

function upd(){
  save();
  link=buildLink();sms=buildSms(link);
  var el=document.getElementById('sms-txt'),cc=document.getElementById('char-ct');
  if(el)el.textContent=sms;
  if(cc){var n=sms.length;cc.textContent=n+' characters'+(n>160?' ('+Math.ceil(n/160)+' messages)':'');cc.className='char-ct '+(n<=160?'ok':n<=320?'warn':'over');}
}

function generate(){
  upd();
  function done(){
    document.getElementById('result').classList.add('show');
    setTimeout(function(){document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});},100);
    toast('Link copied to clipboard');
  }
  navigator.clipboard.writeText(link).then(done).catch(function(){
    var ta=document.createElement('textarea');ta.value=link;ta.style.cssText='position:fixed;top:-9999px';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');}catch(e){}
    document.body.removeChild(ta);done();
  });
}

function copyTxt(){
  navigator.clipboard.writeText(sms).then(function(){toast('Text copied \u2014 open Messages and paste');}).catch(function(){
    var ta=document.createElement('textarea');ta.value=sms;ta.style.cssText='position:fixed;top:-9999px';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');}catch(e){}
    document.body.removeChild(ta);toast('Text copied \u2014 open Messages and paste');
  });
}

function openSms(){window.location.href='sms:?body='+encodeURIComponent(sms);}

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}

load();upd();
</script>
</body>
</html>
